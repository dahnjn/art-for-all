<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎨 ART for ALL GAMEBOARD</title>
<style>
/* CSS Styles */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fff;min-height:100vh;padding:40px 20px;color:#1a1a1a}
.container{max-width:1400px;margin:0 auto}
header{text-align:center;margin-bottom:50px;border-bottom:1px solid #e0e0e0;padding-bottom:30px}
h1{font-size:2rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:25px;color:#000}
.controls{display:flex;flex-direction:column;align-items:center;gap:20px}
.search-box{position:relative;width:100%;max-width:400px}
.search-box input{width:100%;padding:12px 15px 12px 40px;border:1px solid #ccc;background:#fafafa;color:#333;font-size:0.9rem;outline:none}
.search-box::before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#999;font-size:1.1rem}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.filter-tag{padding:8px 16px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;transition:all 0.2s}
.filter-tag.active{background:#000;color:#fff;border-color:#000}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.art-card{background:#fff;border:6px solid #000;height:475px;display:flex;flex-direction:column;position:relative}
.card-header{padding:15px;background:#fff;border-bottom:1px solid #eee}
.artwork-title{color:#000;font-size:0.85rem;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.image-container{flex:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;padding:15px;overflow:hidden}
.image-container img{max-width:100%;max-height:100%;object-fit:contain}
.card-footer{padding:10px 15px;background:#fafafa;border-top:1px solid #eee}
.ticket-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ticket-chip{display:flex;justify-content:space-between;padding:4px 8px;border-radius:2px;font-size:0.65rem}
.city-newyork{background:#FFE5E5;color:#B91C1C}.city-london{background:#E0E7FF;color:#3730A3}.city-paris{background:#FEF3C7;color:#92400E}
.city-dubai{background:#DBEAFE;color:#1E40AF}.city-capetown{background:#D1FAE5;color:#065F46}.city-mexicocity{background:#FCE7F3;color:#9F1239}
.city-saopaulo{background:#F3E8FF;color:#6B21A8}.city-tokyo{background:#FED7AA;color:#9A3412}.city-shanghai{background:#E0F2FE;color:#075985}
.add-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;background:#000;color:#fff;border:none;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;border-radius:50%}
.team-badge{position:absolute;top:10px;right:50px;padding:6px 12px;font-size:0.7rem;font-weight:700;border-radius:4px;z-index:2;display:flex;align-items:center;gap:6px;text-transform:uppercase}
.team-badge.team-1{background:#E94235;color:#fff}
.team-badge.team-2{background:#FBBC04;color:#000}
.team-badge.team-3{background:#4285F4;color:#fff}
.team-badge.team-4{background:#0F9D58;color:#fff}
.team-badge .remove{cursor:pointer;font-weight:bold;opacity:0.7;padding:0 4px}
.map-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;display:none;flex-direction:column}
.map-modal.show{display:flex}
.map-header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#111;border-bottom:1px solid #333;color:#fff}
.map-content{flex:1;display:flex;position:relative;overflow:hidden}
.map-area{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;padding:20px}
.sidebar{width:320px;background:#111;padding:20px;overflow-y:auto;border-left:1px solid #333;color:#fff}
.connection-line { stroke: #444; stroke-width: 2; }
.city-label { fill: #fff; font-size: 14px; text-anchor: middle; font-weight: bold; }
.scoreboard-container { background:#222; padding:15px; border-radius:4px; margin-bottom:20px; }
.team-panel { background:#222; padding:10px; margin-bottom:10px; border-radius:4px; border-left: 4px solid #fff; }
button.action-btn { width:100%; padding:10px; margin-bottom:8px; background:#0F9D58; color:#fff; border:none; cursor:pointer; font-weight:bold; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎨 ART for ALL</h1>
    <div class="controls">
      <div class="search-box"><input type="text" id="searchInput" placeholder="Search artworks..."></div>
      <div class="filter-row">
        <button class="filter-tag active" data-category="all">All</button>
        <button class="filter-tag" data-category="painting">Painting</button>
        <button class="filter-tag" data-category="sculpture">Sculpture</button>
        <button class="filter-tag" data-category="installation">Installation</button>
        <button class="filter-tag" data-category="photography">Photography</button>
      </div>
      <button id="mapBtn" style="margin-top:15px;padding:12px 30px;background:#000;color:#fff;border:none;cursor:pointer;letter-spacing:0.1em">OPEN TRAVEL MAP</button>
    </div>
  </header>
  <div class="gallery" id="gallery"></div>
</div>

<div class="map-modal" id="mapModal">
  <div class="map-header">
    <div>🎨 TRAVEL MAP</div>
    <button id="mapClose" style="background:none;color:#fff;border:1px solid #fff;padding:5px 15px;cursor:pointer">✕ CLOSE</button>
  </div>
  <div class="map-content">
    <div class="map-area">
      <svg id="mapSvg" viewBox="0 0 1000 600" style="width:100%;height:100%">
        <g id="connections"></g>
        <g id="cities"></g>
        <g id="teams"></g>
      </svg>
    </div>
    <div class="sidebar">
      <div class="scoreboard-container">
        <h3>SCOREBOARD</h3>
        <div id="scoreboard"></div>
      </div>
      <div class="game-controls">
        <button class="action-btn" id="nextYear">NEXT YEAR →</button>
        <button class="action-btn" id="saveGame" style="background:#4285F4">💾 SAVE</button>
        <button class="action-btn" id="loadGame" style="background:#FBBC04;color:#000">📂 LOAD</button>
      </div>
      <div id="teamPanels"></div>
    </div>
  </div>
</div>

<script>
// Data and Logic
const artworks = [
  {title:"Infinity Mirrored Room",artist:"Yayoi Kusama",year:"2013",category:"installation",image:"https://dahnjn.github.io/art-for-all-images/installation_4.jpg",cities:{"newyork": 12, "london": 12, "paris": 12, "dubai": 12, "capetown": 12, "mexicocity": 12, "saopaulo": 12, "tokyo": 12, "shanghai": 12}},
  {title:"Cloud Gate",artist:"Anish Kapoor",year:"2006",category:"installation",image:"https://dahnjn.github.io/art-for-all-images/installation_1.jpg",cities:{"newyork": 12, "london": 12, "paris": 11, "dubai": 11, "capetown": 11, "mexicocity": 10, "saopaulo": 10, "tokyo": 10, "shanghai": 8}},
  {title:"The Scream",artist:"Edvard Munch",year:"1893",category:"painting",image:"https://dahnjn.github.io/art-for-all-images/painting_1.jpg",cities:{"newyork": 12, "london": 12, "paris": 12, "dubai": 11, "capetown": 10, "mexicocity": 8, "saopaulo": 6, "tokyo": 4, "shanghai": 5}},
  {title:"Forever Bicycles",artist:"Ai Weiwei",year:"2011",category:"installation",image:"https://dahnjn.github.io/art-for-all-images/installation_3.webp",cities:{"newyork": 8, "london": 8, "paris": 9, "dubai": 9, "capetown": 8, "mexicocity": 7, "saopaulo": 6, "tokyo": 12, "shanghai": 12}}
  // ... (Full list of 24 would go here; shortened for code block clarity)
];

const cityData = {
  start: {name: 'START', pop: 0, x: 400, y: 550, connections: ['saopaulo', 'capetown']},
  saopaulo: {name: 'SAO PAULO', pop: 750000, x: 300, y: 480, connections: ['mexicocity', 'start']},
  mexicocity: {name: 'MEXICO CITY', pop: 600000, x: 180, y: 350, connections: ['newyork', 'saopaulo']},
  newyork: {name: 'NEW YORK', pop: 1500000, x: 250, y: 200, connections: ['london', 'paris', 'mexicocity']},
  london: {name: 'LONDON', pop: 1200000, x: 480, y: 140, connections: ['newyork', 'paris']},
  paris: {name: 'PARIS', pop: 1000000, x: 520, y: 220, connections: ['dubai', 'capetown', 'newyork', 'london']},
  capetown: {name: 'CAPE TOWN', pop: 700000, x: 580, y: 450, connections: ['start', 'dubai', 'shanghai', 'paris']},
  dubai: {name: 'DUBAI', pop: 500000, x: 700, y: 280, connections: ['paris', 'capetown', 'shanghai']},
  shanghai: {name: 'SHANGHAI', pop: 2000000, x: 820, y: 260, connections: ['tokyo', 'capetown', 'dubai']},
  tokyo: {name: 'TOKYO', pop: 1200000, x: 920, y: 180, connections: ['shanghai']}
};

let gameState = {
  round: 1,
  maxRounds: 8,
  teams: {
    1: {cash: 0, city: 'start', artworks: [], soldTo: {}},
    2: {cash: 0, city: 'start', artworks: [], soldTo: {}},
    3: {cash: 0, city: 'start', artworks: [], soldTo: {}},
    4: {cash: 0, city: 'start', artworks: [], soldTo: {}}
  }
};

const teamColors = { 1: '#E94235', 2: '#FBBC04', 3: '#4285F4', 4: '#0F9D58' };

// CORE FUNCTIONS
function init() {
  renderGallery();
  renderMap();
  updateUI();
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = artworks.map((art, idx) => `
    <div class="art-card" data-idx="${idx}">
      <div class="add-btn" onclick="assignArtwork(${idx})">+</div>
      <div class="team-badge-container"></div>
      <div class="card-header"><div class="artwork-title">${art.title}</div></div>
      <div class="image-container"><img src="${art.image}"></div>
      <div class="card-footer">
        <div class="ticket-grid">${Object.entries(art.cities).map(([c,p])=>`<div class="ticket-chip city-${c}">${p}</div>`).join('')}</div>
      </div>
    </div>`).join('');
}

function renderMap() {
  const connGroup = document.getElementById('connections');
  const cityGroup = document.getElementById('cities');
  Object.entries(cityData).forEach(([id, city]) => {
    city.connections.forEach(target => {
      const t = cityData[target];
      if (city.x < t.x) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', city.x); line.setAttribute('y1', city.y);
        line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
        line.setAttribute('class', 'connection-line'); connGroup.appendChild(line);
      }
    });
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', city.x); circle.setAttribute('cy', city.y);
    circle.setAttribute('r', 15); circle.setAttribute('fill', '#fff'); circle.setAttribute('stroke', '#000');
    cityGroup.appendChild(circle);
  });
}

function updateUI() {
  // Update badges on cards
  document.querySelectorAll('.art-card').forEach(card => {
    const idx = parseInt(card.dataset.idx);
    const container = card.querySelector('.team-badge-container');
    container.innerHTML = '';
    for (let i = 1; i <= 4; i++) {
      if (gameState.teams[i].artworks.some(a => a.idx === idx)) {
        container.innerHTML = `<div class="team-badge team-${i}">TEAM ${i}</div>`;
      }
    }
  });

  // Scoreboard
  const scores = [1,2,3,4].map(i => ({i, cash: gameState.teams[i].cash})).sort((a,b)=>b.cash - a.cash);
  document.getElementById('scoreboard').innerHTML = scores.map(s => `
    <div style="padding:5px; border-bottom:1px solid #444">
      <span style="color:${teamColors[s.i]}">TEAM ${s.i}</span>: $${(s.cash/1000000).toFixed(1)}M
    </div>`).join('');

  // Team Panels
  document.getElementById('teamPanels').innerHTML = [1,2,3,4].map(i => `
    <div class="team-panel" style="border-color:${teamColors[i]}">
      <div>TEAM ${i} - ${cityData[gameState.teams[i].city].name}</div>
      <select onchange="gameState.teams[${i}].targetCity = this.value">
        <option value="">Target Destination</option>
        ${cityData[gameState.teams[i].city].connections.map(c => `<option value="${c}">${cityData[c].name}</option>`).join('')}
      </select>
    </div>`).join('');
  
  // Render Markers
  const teamGroup = document.getElementById('teams');
  teamGroup.innerHTML = '';
  for (let i = 1; i <= 4; i++) {
    const pos = cityData[gameState.teams[i].city];
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', pos.x + (i-2.5)*15); circle.setAttribute('cy', pos.y);
    circle.setAttribute('r', 8); circle.setAttribute('fill', teamColors[i]); teamGroup.appendChild(circle);
  }
}

function assignArtwork(idx) {
  const teamNum = prompt("Assign to Team (1-4):");
  const price = prompt("Price (Millions):");
  if (teamNum && price) {
    gameState.teams[teamNum].artworks.push({idx, price: parseFloat(price)});
    gameState.teams[teamNum].cash -= (parseFloat(price) * 1000000);
    updateUI();
  }
}

// SAVE/LOAD LOGIC
document.getElementById('loadGame').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
      const data = JSON.parse(event.target.result);
      gameState = data.gameState;
      updateUI();
      alert("Loaded successfully!");
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
});

document.getElementById('mapBtn').onclick = () => document.getElementById('mapModal').classList.add('show');
document.getElementById('mapClose').onclick = () => document.getElementById('mapModal').classList.remove('show');

init();
</script>
</body>
</html>
