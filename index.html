<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎨 ART for ALL GAMEBOARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fff;min-height:100vh;padding:40px 20px;color:#1a1a1a}
.container{max-width:1400px;margin:0 auto}
header{text-align:center;margin-bottom:50px;border-bottom:1px solid #e0e0e0;padding-bottom:30px}
h1{font-size:2rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:25px;color:#000}
.controls{display:flex;flex-direction:column;align-items:center;gap:20px}
.search-box{position:relative;width:100%;max-width:400px}
.search-box input{width:100%;padding:12px 15px 12px 40px;border:1px solid #ccc;background:#fafafa;color:#333;font-size:0.9rem;font-family:'Helvetica Now Micro','Helvetica Neue',Helvetica,Arial,sans-serif;outline:none}
.search-box input:focus{border-color:#000}
.search-box::before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#999;font-size:1.1rem}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.filter-tag{padding:8px 16px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;font-size:0.75rem;font-family:'Helvetica Now Micro','Helvetica Neue',Helvetica,Arial,sans-serif;text-transform:uppercase;letter-spacing:0.1em;transition:all 0.2s}
.filter-tag:hover{border-color:#000;color:#000}
.filter-tag.active{background:#000;color:#fff;border-color:#000}
.sort-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
.sort-row label{color:#999;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em}
.sort-row select{padding:8px 12px;border:1px solid #ccc;background:#fff;color:#333;font-family:'Helvetica Now Micro','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:0.8rem}
.results-count{color:#999;text-align:center;margin-bottom:20px;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.art-card{background:#fff;border:6px solid #000;height:475px;display:flex;flex-direction:column;transition:box-shadow 0.3s;position:relative}
.art-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.art-card.hidden{display:none}
.card-header{padding:15px;background:#fff;border-bottom:1px solid #eee}
.artwork-title{color:#000;font-size:0.85rem;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artist-name{color:#666;font-size:0.8rem;font-weight:400}
.artwork-meta{color:#999;font-size:0.7rem;margin-top:4px;text-transform:uppercase;letter-spacing:0.05em}
.image-container{flex:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;padding:15px;overflow:hidden}
.image-container img{max-width:100%;max-height:100%;object-fit:contain}
.card-footer{padding:10px 15px;background:#fafafa;border-top:1px solid #eee}
.category-row{display:flex;justify-content:center;gap:5px;margin-bottom:8px}
.category-tag{padding:4px 10px;background:#f0f0f0;color:#666;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em}
.ticket-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ticket-chip{display:flex;justify-content:space-between;padding:4px 8px;border-radius:2px;font-size:0.65rem}
.ticket-city{font-weight:600;text-transform:uppercase}
.ticket-price{font-weight:400}
.city-newyork{background:#FFE5E5;color:#B91C1C}.city-london{background:#E0E7FF;color:#3730A3}.city-paris{background:#FEF3C7;color:#92400E}
.city-dubai{background:#DBEAFE;color:#1E40AF}.city-capetown{background:#D1FAE5;color:#065F46}.city-mexicocity{background:#FCE7F3;color:#9F1239}
.city-saopaulo{background:#F3E8FF;color:#6B21A8}.city-tokyo{background:#FED7AA;color:#9A3412}.city-shanghai{background:#E0F2FE;color:#075985}
.add-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;background:#000;color:#fff;border:none;font-size:1.5rem;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;border-radius:50%;line-height:1}
.team-badge{position:absolute;top:10px;right:50px;padding:6px 12px;font-size:0.7rem;font-weight:700;border-radius:4px;z-index:2;display:flex;align-items:center;gap:6px;text-transform:uppercase}
.team-badge.team-1{background:#E94235;color:#fff}
.team-badge.team-2{background:#FBBC04;color:#000}
.team-badge.team-3{background:#4285F4;color:#fff}
.team-badge.team-4{background:#0F9D58;color:#fff}
.team-badge .remove{cursor:pointer;font-weight:bold;opacity:0.7;padding:0 4px}
.map-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;display:none;flex-direction:column}
.map-modal.show{display:flex}
.map-header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#111;border-bottom:1px solid #333}
.map-title{color:#fff;font-family:'Helvetica Now Micro','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:1.2rem}
.map-close{background:#333;color:#fff;border:none;padding:8px 16px;cursor:pointer;font-family:'Helvetica Now Micro','Helvetica Neue',Helvetica,Arial,sans-serif}
.map-content{flex:1;display:flex;position:relative;overflow:hidden}
.map-area{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;padding:20px}
.map-container{position:relative;width:100%;max-width:1200px;height:100%;max-height:800px}
svg.map-svg{width:100%;height:100%}
.city-circle{cursor:pointer;transition:all 0.3s;fill:#fff;stroke:#000;stroke-width:2}
.city-label { fill: #fff; font-size: 18px; font-weight: bold; text-anchor: middle; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
.city-pop-label { fill: #000; font-size: 14px; font-weight: bold; text-anchor: middle; pointer-events:none; }
.connection-line { stroke: #999; stroke-width: 3; }
.sidebar{width:320px;background:#111;padding:20px;overflow-y:auto;border-left:1px solid #333}
.sidebar h3{color:#fff;font-size:0.9rem;margin-bottom:15px;text-transform:uppercase;letter-spacing:0.1em}
.round-info{background:#222;padding:15px;margin-bottom:15px;border-radius:4px}
.round-info label{color:#888;font-size:0.75rem;display:block;margin-bottom:5px}
.round-info span{color:#fff;font-size:1.2rem;font-weight:bold}
.team-panel{background:#222;padding:15px;margin-bottom:10px;border-radius:4px;border-left:4px solid}
.team-panel.team-1{border-left-color:#E94235}
.team-panel.team-2{border-left-color:#FBBC04}
.team-panel.team-3{border-left-color:#4285F4}
.team-panel.team-4{border-left-color:#0F9D58}
.team-panel h4{color:#fff;font-size:0.85rem;margin-bottom:10px}
.team-panel select{width:100%;padding:8px;background:#333;color:#fff;border:1px solid #444;margin-bottom:8px;font-family:'Helvetica Now Micro','Helvetica Neue',Helvetica,Arial,sans-serif}
.team-stat{display:flex;justify-content:space-between;color:#ccc;font-size:0.75rem;margin-top:5px;font-family:'Helvetica Now Micro','Helvetica Neue',Helvetica,Arial,sans-serif}
.game-controls{padding:15px;background:#222;border-radius:4px;margin-bottom:15px}
.game-controls button{width:100%;padding:10px;margin-bottom:8px;background:#0F9D58;color:#fff;border:none;cursor:pointer;font-family:'Helvetica Now Micro','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:bold;font-size:0.85rem}
#resetGame{background:#E94235}
#saveGame{background:#4285F4}
#loadGame{background:#FBBC04;color:#000}
.log-container{background:#222;padding:15px;border-radius:4px;max-height:300px;overflow-y:auto}
.log-container h3{color:#fff;font-size:0.85rem;margin-bottom:10px;text-transform:uppercase}
.log-entry{color:#ccc;font-size:0.75rem;margin-bottom:5px;background:#1a1a1a;padding:5px;border-radius:2px}
</style>

<body>
<div class="container">
<header>
  <h1>🎨 ART for ALL</h1>
  <div class="controls">
    <div class="search-box"><input type="text" id="searchInput" placeholder="Search artworks..."></div>
    <div class="filter-row">
      <button class="filter-tag active" data-category="all">All</button>
      <button class="filter-tag" data-category="painting">Painting</button>
      <button class="filter-tag" data-category="sculpture">Sculpture</button>
      <button class="filter-tag" data-category="installation">Installation</button>
      <button class="filter-tag" data-category="photography">Photography</button>
    </div>
    <button id="mapBtn" style="margin-top:15px;padding:12px 30px;background:#000;color:#fff;border:none;cursor:pointer">MAP</button>
  </div>
</header>
<div id="competitiveAnalysis" style="margin-bottom:30px;display:none">
  <h2 style="text-align:center;font-size:1.2rem;margin-bottom:20px;text-transform:uppercase">Competitive Analysis</h2>
  <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:0.85rem"><tbody id="analysisTableBody"></tbody></table>
  </div>
</div>
<div class="gallery" id="gallery"></div>
</div>

<div class="map-modal" id="mapModal">
  <div class="map-header">
    <div class="map-title">🎨 TRAVEL MAP</div>
    <div style="display:flex;align-items:center;gap:20px;color:#fff">
      Rounds:<input type="number" id="totalRounds" class="rounds-input" value="8">
      <button class="map-close" id="mapClose">✕ CLOSE</button>
    </div>
  </div>
  <div class="map-content">
    <div class="map-area">
      <div class="map-container">
        <svg class="map-svg" id="mapSvg" viewBox="0 0 1000 600">
          <g id="connectionLines"></g>
          <g id="citiesGroup"></g>
          <g id="teamsGroup"></g>
        </svg>
      </div>
    </div>
    <div class="sidebar">
      <div class="round-info"><label>Rounds Remaining</label><span id="roundsRemaining">8</span></div>
      <div class="scoreboard-container"><h3>Scoreboard</h3><div id="scoreboard"></div></div>
      <div class="game-controls">
        <button id="nextRound">NEXT YEAR →</button>
        <button id="resetGame">⟲ RESET</button>
        <button id="saveGame">💾 SAVE</button>
        <button id="loadGame">📂 LOAD</button>
      </div>
      <div id="teamDestinations">
        <div class="team-panel team-1"><h4>RED</h4><select id="dest1"></select><div class="team-stat">Value:<span id="tv1">$0</span></div><div class="team-stat">Cash:<span id="cash1">$0</span></div></div>
        <div class="team-panel team-2"><h4>YELLOW</h4><select id="dest2"></select><div class="team-stat">Value:<span id="tv2">$0</span></div><div class="team-stat">Cash:<span id="cash2">$0</span></div></div>
        <div class="team-panel team-3"><h4>BLUE</h4><select id="dest3"></select><div class="team-stat">Value:<span id="tv3">$0</span></div><div class="team-stat">Cash:<span id="cash3">$0</span></div></div>
        <div class="team-panel team-4"><h4>GREEN</h4><select id="dest4"></select><div class="team-stat">Value:<span id="tv4">$0</span></div><div class="team-stat">Cash:<span id="cash4">$0</span></div></div>
      </div>
      <div class="log-container"><h3>Log</h3><div id="logEntries"></div></div>
    </div>
  </div>
</div>

  teams: {
    1: {cash: 0, city: 'start', artworks: [], soldTo: {}},
    2: {cash: 0, city: 'start', artworks: [], soldTo: {}},

  }
};

const colors = { 1: '#E94235', 2: '#FBBC04', 3: '#4285F4', 4: '#0F9D58' };

// MAP LOGIC
function drawCities() {
  const g = document.getElementById('citiesGroup');
  g.innerHTML = '';
  Object.entries(cityData).forEach(([id, c]) => {
    const radius = id === 'start' ? 35 : Math.sqrt(c.pop / 10000) * 3;
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', c.x); circle.setAttribute('cy', c.y);
    circle.setAttribute('r', radius); circle.setAttribute('class', 'city-circle');
    g.appendChild(circle);

    const abbr = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    abbr.setAttribute('x', c.x); abbr.setAttribute('y', c.y - radius - 10);
    abbr.setAttribute('class', 'city-label'); abbr.textContent = c.abbr || c.name;
    g.appendChild(abbr);

    if (id !== 'start') {
      const pop = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      pop.setAttribute('x', c.x); pop.setAttribute('y', c.y + 5);
      pop.setAttribute('class', 'city-pop-label'); pop.textContent = (c.pop / 1000000).toFixed(1) + 'M';
      g.appendChild(pop);
    }
  });
}

function drawConnections() {
  const g = document.getElementById('connectionLines'); g.innerHTML = '';
  Object.entries(cityData).forEach(([id, city]) => {
    city.connections.forEach(t => {
      const target = cityData[t];
      if (city.x < target.x) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', city.x); line.setAttribute('y1', city.y);
        line.setAttribute('x2', target.x); line.setAttribute('y2', target.y);
        line.setAttribute('class', 'connection-line'); g.appendChild(line);
      }
    });
  });
}

function drawMarkers() {
  const g = document.getElementById('teamsGroup'); g.innerHTML = '';
  for (let i = 1; i <= 4; i++) {
    const pos = cityData[gameState.teams[i].city];
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', pos.x + (i-2.5)*15); circle.setAttribute('cy', pos.y);
    circle.setAttribute('r', 10); circle.setAttribute('fill', colors[i]);
    circle.setAttribute('stroke', '#000'); g.appendChild(circle);
  }
}

// GAMEPLAY ENGINE
function calculateRevenue() {
  const results = [];
  const destinations = {};
  const tv = getTeamTicketValues();

  for (let i = 1; i <= 4; i++) {
    const dest = document.getElementById(`dest${i}`).value || gameState.teams[i].city;
    if (dest !== 'start') {
      if (!destinations[dest]) destinations[dest] = [];
      destinations[dest].push({id: i, value: tv[i][dest]});
      gameState.teams[i].city = dest;
    }
  }

  Object.entries(destinations).forEach(([cityId, teams]) => {
    const pop = cityData[cityId].pop;
    teams.sort((a,b) => b.value - a.value);
    
    // Revenue share logic
    teams.forEach((t, idx) => {
      const alreadySold = gameState.teams[t.id].soldTo[cityId] || 0;
      const idealShare = teams.length === 1 ? 1.0 : (idx === 0 ? 0.6 : 0.2);
      const actualShare = Math.min(idealShare, 1.0 - alreadySold);
      const rev = Math.round(pop * t.value * actualShare);
      
      gameState.teams[t.id].cash += rev;
      gameState.teams[t.id].soldTo[cityId] = alreadySold + actualShare;
      results.push(`Team ${t.id} in ${cityData[cityId].name}: +$${rev.toLocaleString()}`);
    });
  });
  return results;
}

function nextRound() {
  const logs = calculateRevenue();
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<strong>Year ${gameState.round}:</strong><br>` + logs.join('<br>');
  document.getElementById('logEntries').prepend(entry);

  gameState.round++;
  updateDisplay();
}

function updateDisplay() {
  const tv = getTeamTicketValues();
  for (let i = 1; i <= 4; i++) {
    const team = gameState.teams[i];
    document.getElementById(`tv${i}`).textContent = '$' + (tv[i][team.city] || 0);
    const cashEl = document.getElementById(`cash${i}`);
    cashEl.textContent = '$' + team.cash.toLocaleString();
    cashEl.style.color = team.cash < 0 ? '#E94235' : '#0F9D58';
    
    const sel = document.getElementById(`dest${i}`);
    sel.innerHTML = '<option value="">Stay</option>' + cityData[team.city].connections.map(c => `<option value="${c}">${cityData[c].name}</option>`).join('');
    
    // Refresh badges on gallery cards
    document.querySelectorAll(`.team-badge-container[data-idx]`).forEach(container => {
      const idx = parseInt(container.dataset.idx);
      if (team.artworks.some(a => a.idx === idx)) {
        const card = container.closest('.art-card');
        card.dataset.team = 'TEAM ' + i;
        container.innerHTML = `<div class="team-badge team-${i}"><span>TEAM ${i}</span><span class="remove" onclick="removeArt(${idx}, ${i})">×</span></div>`;
      }
    });
  }

  const sorted = [1,2,3,4].map(n => ({n, cash: gameState.teams[n].cash})).sort((a,b) => b.cash - a.cash);
  document.getElementById('scoreboard').innerHTML = sorted.map((s, idx) => `<div style="padding:5px; border-left:4px solid ${colors[s.n]}; background:#333; margin:2px">#${idx+1} TEAM ${s.n}: $${s.cash.toLocaleString()}</div>`).join('');
  document.getElementById('roundsRemaining').textContent = Math.max(0, gameState.maxRounds - gameState.round + 1);
  drawMarkers();
}

function getTeamTicketValues() {
  const values = {1:{},2:{},3:{},4:{}};
  Object.keys(cityNamesAbbr).forEach(c => [1,2,3,4].forEach(t => values[t][c] = 0));
  document.querySelectorAll('.art-card[data-team]').forEach(card => {
    const tNum = parseInt(card.dataset.team.replace('TEAM ', ''));
    const art = artworks[parseInt(card.dataset.idx)];
    Object.keys(cityNamesAbbr).forEach(c => values[tNum][c] += art.cities[c]);
  });
  return values;
}

function removeArt(idx, teamNum) {
  const aIdx = gameState.teams[teamNum].artworks.findIndex(a => a.idx === idx);
  gameState.teams[teamNum].cash += (gameState.teams[teamNum].artworks[aIdx].price * 1000000);
  gameState.teams[teamNum].artworks.splice(aIdx, 1);
  const card = document.querySelector(`.art-card[data-idx="${idx}"]`);
  delete card.dataset.team;
  card.querySelector('.team-badge-container').innerHTML = '';
  updateDisplay();
}

function initGallery() {
  document.getElementById('gallery').innerHTML = artworks.map((art, idx) => `
    <div class="art-card" data-idx="${idx}">
      <div class="add-btn" onclick="assignArt(${idx})">+</div>
      <div class="team-badge-container" data-idx="${idx}"></div>
      <div class="card-header"><div class="artwork-title">${art.title}</div><div class="artist-name">${art.artist}</div></div>
      <div class="image-container"><img src="${art.image}"></div>
      <div class="card-footer"><div class="ticket-grid">${Object.entries(art.cities).map(([c,p]) => `<div class="ticket-chip city-${c}">${p}</div>`).join('')}</div></div>
    </div>`).join('');
}

function assignArt(idx) {
  const t = prompt("Team (1-4):");
  const p = prompt("Price ($M):");
  if (t && p) {
    gameState.teams[t].artworks.push({idx, price: parseFloat(p)});
    gameState.teams[t].cash -= (parseFloat(p) * 1000000);
    updateDisplay();
  }
}

// LOADING FIX
document.getElementById('loadGame').onclick = () => {
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
      const data = JSON.parse(event.target.result);
      gameState = data.gameState;
      document.querySelectorAll('.art-card').forEach(c => { delete c.dataset.team; c.querySelector('.team-badge-container').innerHTML = ''; });
      if (data.artworkAssignments) {
        data.artworkAssignments.forEach(a => {
          const card = document.querySelector(`.art-card[data-idx="${a.idx}"]`);
          if (card) card.dataset.team = 'TEAM ' + a.team;
        });
      }
      updateDisplay(); drawCities(); drawConnections();
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
};

document.getElementById('mapBtn').onclick = () => { document.getElementById('mapModal').classList.add('show'); drawCities(); drawConnections(); drawMarkers(); updateDisplay(); };
document.getElementById('mapClose').onclick = () => document.getElementById('mapModal').classList.remove('show');
document.getElementById('nextRound').onclick = nextRound;

initGallery();
</script>
</body>
</html>
